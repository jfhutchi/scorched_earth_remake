name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: JavaScript syntax
        run: node scripts/static-check.mjs

      - name: Version consistency
        run: node scripts/validate-version.mjs v0.7.1

      - name: Release notes entry
        run: node scripts/check-release-notes.mjs v0.7.1

      - name: Artifact pollution
        run: node scripts/check-artifacts.mjs

      - name: GitHub Pages-safe paths
        run: node scripts/check-pages-paths.mjs

  deploy:
    name: Deploy main to Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage static site
        run: |
          mkdir site
          cp index.html styles.css site/
          cp manifest.webmanifest site/
          cp -R icons site/icons
          cp -R src site/src

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
